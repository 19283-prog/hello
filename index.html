<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaun AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-app {
      width: 100%;
      max-width: 900px;
      height: 95vh;
      background: white;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .chat-header {
      background: #111827;
      color: white;
      padding: 16px 20px;
      font-size: 22px;
      font-weight: bold;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message-row {
      display: flex;
      width: 100%;
    }
    .user-row { justify-content: flex-end; }
    .ai-row { justify-content: flex-start; }
    .message-wrap { max-width: 75%; }
    .label {
      font-size: 12px;
      margin-bottom: 4px;
      font-weight: bold;
      opacity: 0.7;
    }
    .message {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user-message {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 6px;
    }
    .ai-message {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
      border-bottom-left-radius: 6px;
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #ddd;
      background: white;
    }
    .chat-input-area input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      outline: none;
    }
    .chat-input-area button {
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">Shaun AI</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://shaun-ai-backend.onrender.com";
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function addMessage(sender, text) {
      const row = document.createElement("div");
      row.classList.add("message-row", sender === "user" ? "user-row" : "ai-row");

      const wrap = document.createElement("div");
      wrap.classList.add("message-wrap");

      const label = document.createElement("div");
      label.classList.add("label");
      label.textContent = sender === "user" ? "You" : "AI";

      const bubble = document.createElement("div");
      bubble.classList.add("message", sender === "user" ? "user-message" : "ai-message");
      bubble.textContent = text;

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      row.appendChild(wrap);
      chatBox.appendChild(row);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage("user", message);
      userInput.value = "";

      try {
        const response = await fetch(`${API_BASE}/ask`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question: message })
        });

        const data = await response.json();
        addMessage("ai", data.answer);
      } catch (error) {
        addMessage("ai", "Error: Could not connect to server.");
        console.error(error);
      }
    }

    async function loadMemory() {
      try {
        const response = await fetch(`${API_BASE}/memory`);
        const memory = await response.json();

        for (const item of memory) {
          if (item.role === "user") addMessage("user", item.content);
          if (item.role === "assistant") addMessage("ai", item.content);
        }
      } catch (error) {
        console.error("Could not load memory:", error);
      }
    }

    userInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    loadMemory();
  </script>
</body>
</html>
