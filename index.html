<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 280px;
      background: #202123;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
    }

    .sidebar h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    .new-chat-btn {
      background: #10a37f;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .new-chat-btn:hover {
      background: #0e8e6d;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      background: #2b2c2f;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .chat-item.active {
      background: #3a3b3f;
    }

    .chat-title {
      flex: 1;
      font-size: 14px;
      word-break: break-word;
    }

    .delete-btn {
      background: #b00020;
      border: none;
      color: white;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #8f0019;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 12px 16px;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 70%;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #10a37f;
      color: white;
    }

    .assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid #ddd;
      color: #222;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: white;
      border-top: 1px solid #ddd;
      box-sizing: border-box;
    }

    .input-row input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .input-row button {
      padding: 12px 18px;
      border: none;
      background: #10a37f;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .input-row button:hover {
      background: #0e8e6d;
    }

    .empty-state {
      color: #666;
      text-align: center;
      margin-top: 80px;
    }

    @media (max-width: 800px) {
      .sidebar {
        width: 220px;
      }

      .message {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Cortex AI</h2>
    <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="main">
    <div class="topbar" id="chatHeader">Chat</div>
    <div class="chat-box" id="chatBox"></div>

    <div class="input-row">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message..."
        onkeydown="handleEnter(event)"
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://shaun-ai-backend.onrender.com";

    let userId = localStorage.getItem("cortexUserId");
    let currentChatId = localStorage.getItem("cortexCurrentChatId");

    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem("cortexUserId", userId);
    }

    function saveCurrentChatId(chatId) {
      currentChatId = chatId;
      localStorage.setItem("cortexCurrentChatId", chatId);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderMessages(messages) {
      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML = "";

      if (!messages || messages.length === 0) {
        chatBox.innerHTML = `<div class="empty-state">Start a new conversation.</div>`;
        return;
      }

      messages.forEach((msg) => {
        const div = document.createElement("div");
        div.className = `message ${msg.role}`;
        div.innerHTML = escapeHtml(msg.content);
        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderChatList(chats) {
      const chatList = document.getElementById("chatList");
      chatList.innerHTML = "";

      chats.forEach((chat) => {
        const item = document.createElement("div");
        item.className = "chat-item" + (chat.id === currentChatId ? " active" : "");

        const title = document.createElement("div");
        title.className = "chat-title";
        title.textContent = chat.title || "New Chat";
        title.onclick = () => loadChat(chat.id);

        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "Delete";
        delBtn.onclick = (e) => {
          e.stopPropagation();
          deleteChat(chat.id);
        };

        item.appendChild(title);
        item.appendChild(delBtn);
        item.onclick = () => loadChat(chat.id);

        chatList.appendChild(item);
      });
    }

    async function loadConversations() {
      const res = await fetch(`${API_BASE}/conversations?userId=${encodeURIComponent(userId)}`);
      const data = await res.json();

      if (!currentChatId && data.currentChatId) {
        saveCurrentChatId(data.currentChatId);
      }

      const chatExists = data.chats.some(chat => chat.id === currentChatId);
      if (!chatExists && data.currentChatId) {
        saveCurrentChatId(data.currentChatId);
      }

      renderChatList(data.chats);

      if (currentChatId) {
        await loadChat(currentChatId);
      }
    }

    async function loadChat(chatId) {
      const res = await fetch(`${API_BASE}/conversations/${chatId}?userId=${encodeURIComponent(userId)}`);
      const chat = await res.json();

      saveCurrentChatId(chat.id);
      document.getElementById("chatHeader").textContent = chat.title || "Chat";
      renderMessages(chat.messages);

      const listRes = await fetch(`${API_BASE}/conversations?userId=${encodeURIComponent(userId)}`);
      const listData = await listRes.json();
      renderChatList(listData.chats);
    }

    async function createNewChat() {
      const res = await fetch(`${API_BASE}/conversations`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ userId })
      });

      const data = await res.json();
      saveCurrentChatId(data.chat.id);

      await loadConversations();
    }

    async function deleteChat(chatId) {
      const confirmed = confirm("Delete this chat?");
      if (!confirmed) return;

      const res = await fetch(`${API_BASE}/conversations/${chatId}?userId=${encodeURIComponent(userId)}`, {
        method: "DELETE"
      });

      const data = await res.json();
      saveCurrentChatId(data.currentChatId);

      await loadConversations();
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const text = input.value.trim();

      if (!text || !currentChatId) return;

      input.value = "";

      const chatBox = document.getElementById("chatBox");

      const userDiv = document.createElement("div");
      userDiv.className = "message user";
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch(`${API_BASE}/ask`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId,
            chatId: currentChatId,
            message: text
          })
        });

        const data = await res.json();

        document.getElementById("chatHeader").textContent = data.chat.title || "Chat";
        renderMessages(data.chat.messages);

        const listRes = await fetch(`${API_BASE}/conversations?userId=${encodeURIComponent(userId)}`);
        const listData = await listRes.json();
        renderChatList(listData.chats);
      } catch (error) {
        const errDiv = document.createElement("div");
        errDiv.className = "message assistant";
        errDiv.textContent = "Error: could not contact the server.";
        chatBox.appendChild(errDiv);
      }
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }

    loadConversations();
  </script>
</body>
</html>
